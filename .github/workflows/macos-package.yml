name: macOS Package

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Branch, tag, or SHA to package (defaults to the selected ref)"
        required: false
        type: string
      sign_artifacts:
        description: "Codesign the packaged executable and DMG"
        required: false
        default: false
        type: boolean
      notarize_artifacts:
        description: "Notarize the DMG after signing"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.git_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  macos-package:
    name: macOS package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: macos-15-intel

    steps:
      - name: Validate workflow inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.notarize_artifacts }}" == "true" && "${{ inputs.sign_artifacts }}" != "true" ]]; then
            echo "notarize_artifacts=true requires sign_artifacts=true" >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref || github.ref_name }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Import signing certificate
        if: ${{ inputs.sign_artifacts }}
        shell: bash
        env:
          CODEX_LB_MACOS_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.CODEX_LB_MACOS_SIGNING_CERTIFICATE_P12_BASE64 }}
          CODEX_LB_MACOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.CODEX_LB_MACOS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()
          for name in CODEX_LB_MACOS_SIGNING_CERTIFICATE_P12_BASE64 CODEX_LB_MACOS_SIGNING_CERTIFICATE_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("${name}")
            fi
          done
          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf 'Missing required signing secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

          CERT_PATH="${RUNNER_TEMP}/codex-lb-signing.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/codex-lb-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          export CERT_PATH

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERT_PATH"]).write_bytes(
              base64.b64decode(os.environ["CODEX_LB_MACOS_SIGNING_CERTIFICATE_P12_BASE64"])
          )
          PY

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${CODEX_LB_MACOS_SIGNING_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcrun
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -d user -s "${KEYCHAIN_PATH}"

      - name: Build macOS package artifacts
        shell: bash
        env:
          CODEX_LB_MACOS_CODESIGN_IDENTITY: ${{ secrets.CODEX_LB_MACOS_CODESIGN_IDENTITY }}
          CODEX_LB_MACOS_NOTARY_APPLE_ID: ${{ secrets.CODEX_LB_MACOS_NOTARY_APPLE_ID }}
          CODEX_LB_MACOS_NOTARY_TEAM_ID: ${{ secrets.CODEX_LB_MACOS_NOTARY_TEAM_ID }}
          CODEX_LB_MACOS_NOTARY_APP_PASSWORD: ${{ secrets.CODEX_LB_MACOS_NOTARY_APP_PASSWORD }}
        run: |
          set -euo pipefail

          args=(--rebuild-frontend)

          if [[ "${{ inputs.sign_artifacts }}" == "true" ]]; then
            if [[ -z "${CODEX_LB_MACOS_CODESIGN_IDENTITY:-}" ]]; then
              echo "Missing required signing secret: CODEX_LB_MACOS_CODESIGN_IDENTITY" >&2
              exit 1
            fi
            args+=(--sign)
          fi

          if [[ "${{ inputs.notarize_artifacts }}" == "true" ]]; then
            missing=()
            for name in CODEX_LB_MACOS_NOTARY_APPLE_ID CODEX_LB_MACOS_NOTARY_TEAM_ID CODEX_LB_MACOS_NOTARY_APP_PASSWORD; do
              if [[ -z "${!name:-}" ]]; then
                missing+=("${name}")
              fi
            done
            if [[ "${#missing[@]}" -gt 0 ]]; then
              printf 'Missing required notarization secret(s): %s\n' "${missing[*]}" >&2
              exit 1
            fi
            args+=(--notarize)
          fi

          ./scripts/build_macos_executable.sh "${args[@]}"

      - name: Upload macOS package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-package-${{ matrix.arch }}
          path: |
            dist/codex-lb-macos-${{ matrix.arch }}.tar.gz
            dist/codex-lb-macos-${{ matrix.arch }}.dmg
            dist/codex-lb-macos-${{ matrix.arch }}.sha256
          retention-days: 14

      - name: Summarize outputs
        shell: bash
        run: |
          {
            echo "### macOS package (${{ matrix.arch }})"
            echo
            echo "- Ref: \`${{ inputs.git_ref || github.ref_name }}\`"
            echo "- Signing: \`${{ inputs.sign_artifacts }}\`"
            echo "- Notarization: \`${{ inputs.notarize_artifacts }}\`"
            echo "- Artifact: \`macos-package-${{ matrix.arch }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
